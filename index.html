 <!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --fondo: #0d0d0d;
            --texto: #e0e0e0;
            --acento: #ff8c00;
            --gemini-bg: rgba(255, 140, 0, 0.05);
            --usuario-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #chat-container {
            max-width: 800px;
            width: 100%;
            transition: filter 0.5s ease;
        }

        article {
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .usuario { border-left: 4px solid var(--acento); background-color: var(--gemini-bg); }

        .avatar {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--acento);
            font-size: 0.8rem;
        }

        h3, h4 { color: var(--acento); margin-top: 0; }
        
        .formula-box {
            display: block;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .math { font-style: italic; color: #ffb366; }

        .image-placeholder {
            margin: 20px 0;
            border: 1px solid rgba(255, 140, 0, 0.3);
            padding: 10px;
            background: #000;
            border-radius: 8px;
            text-align: center;
        }

        .caption {
            font-size: 0.85rem;
            color: var(--acento);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        .poema-box {
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            line-height: 2;
            text-align: center;
            margin: 30px 0;
        }

        .footer-reposo {
            font-family: 'Courier New', monospace;
            color: #555;
            text-align: center;
            padding: 60px 0;
            font-size: 0.9rem;
        }

        .qed {
            font-size: 1.5rem;
            color: var(--acento);
            margin-top: 20px;
        }
    </style>
</head>
